name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate contract artifacts
        run: npm run generate

      - name: Fail on generated-artifact drift
        run: git diff --exit-code -- public/schema/project-bundle.json docs/arkaik-skill/scripts/validate-bundle.js docs/arkaik-skill/references/schema.md lib/prompts/generated plugin/.claude-plugin/plugin.json plugin/skills/arkaik

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Validate seed bundles
        run: npm run validate:seeds

      - name: Validate bundle fixtures
        run: npm run test:fixtures

      - name: Schema validator parity tests
        run: npm run test:schema

      - name: Deterministic id generator tests
        run: npm run test:id-gen

      - name: Canonical serialization determinism tests
        run: npm run test:serialize

      - name: Ref + version format field tests
        run: npm run test:refs

      - name: Journal (Level 2) tests
        run: npm run test:journal

      - name: Journal projection tests
        run: npm run test:journal-projections

      - name: Journal write-primitive (emit) tests
        run: npm run test:emit

      - name: App-side journal emission tests
        run: npm run test:emit-events

      - name: Screenshot data-URI size warning tests
        run: npm run test:screenshot-size

      - name: Bundle migration chain tests
        run: npm run test:migrate

      - name: Provider-injection seam + mutation-notification tests
        run: npm run test:provider

      - name: CLI tests
        run: npm run test:cli

  # Services migration-integrity gate (docs/spec/services.md § CI Additions).
  # Separate job so the local-first `build` job above stays green with no DB.
  services:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arkaik
          POSTGRES_PASSWORD: arkaik
          POSTGRES_DB: arkaik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arkaik -d arkaik_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://arkaik:arkaik@localhost:5432/arkaik_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate

      - name: Re-run migrations (idempotency gate — must be a no-op, exit 0)
        run: npm run db:migrate

      - name: Synk auth-guard integration test (unauthenticated → 401)
        run: npm run test:auth
