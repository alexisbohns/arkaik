name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate contract artifacts
        run: npm run generate

      - name: Fail on generated-artifact drift
        run: git diff --exit-code -- public/schema/project-bundle.json docs/arkaik-skill/scripts/validate-bundle.js docs/arkaik-skill/references/schema.md lib/prompts/generated plugin/.claude-plugin/plugin.json plugin/skills/arkaik

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Validate seed bundles
        run: npm run validate:seeds

      - name: Validate bundle fixtures
        run: npm run test:fixtures

      - name: Schema validator parity tests
        run: npm run test:schema

      - name: Canonical serialization determinism tests
        run: npm run test:serialize

      - name: Ref + version format field tests
        run: npm run test:refs

      - name: Journal (Level 2) tests
        run: npm run test:journal

      - name: Journal projection tests
        run: npm run test:journal-projections

      - name: Journal write-primitive (emit) tests
        run: npm run test:emit

      - name: App-side journal emission tests
        run: npm run test:emit-events

      - name: Screenshot data-URI size warning tests
        run: npm run test:screenshot-size

      - name: Bundle migration chain tests
        run: npm run test:migrate

      - name: CLI tests
        run: npm run test:cli
